services:
  # --- PostgreSQL with pgvector ---
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voiceagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis (required by LiveKit) ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # --- LiveKit Server (WebRTC) ---
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  # --- LiveKit SIP Bridge (phone calls) ---
  livekit-sip:
    image: livekit/sip:latest
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    depends_on:
      - livekit
    restart: unless-stopped

  # --- LiveKit Egress (call recording) ---
  livekit-egress:
    image: livekit/egress:latest
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
    depends_on:
      - livekit
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # --- Dashboard (admin UI + API) ---
  dashboard:
    image: trade10x/voice-agent:latest
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/voiceagent
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Voice Agent Worker (handles live calls) ---
  agent:
    image: trade10x/voice-agent:latest
    command: python -m telephony.server start
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/voiceagent
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      TTS_VOICE: ${TTS_VOICE:-alba}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      TELNYX_API_KEY: ${TELNYX_API_KEY}
      TELNYX_SIP_URI: ${TELNYX_SIP_URI}
      R2_ENDPOINT: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-voice-agent-voice-recordings}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  pgdata:
  redis_data:
  uploads:
